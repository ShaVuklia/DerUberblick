<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shanenigens</title>
    <link rel="stylesheet" href="styles.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Include leaflet CSS file --> 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <!-- Include leaflet JS file -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
</head>

<body>
    <div class="top-bar">
        <div class="container times" id="sunTimes">Wird geladen…</div>
        <div class="container times" id="timeZones">Wird geladen…</div>
        <button id="toggleButton">Hell</button>
    </div>

<div class="app-layout">

    <div class="page-controls">
        <button class="tab active" data-page="forecast-page">Wetter</button>
        <button class="tab" data-page="map-page">Karte</button>
    </div>

    <div class="page-area">
        <!-- FORECAST -->
        <section id="forecast-page" class="page active-page">

            <div>
                <h2>Wettervorhersage Amsterdam</h2>
                <div class="container weather" id="daily-forecast">
                    Wird geladen…
                </div>
            </div>

            <div id="hourly-forecast">
                Wird geladen…
            </div>
            
        </section>

        <!-- MAP -->
        <section id="map-page" class="page">
            <div id="map"></div>
        </section>
    </div>

</div>

    <script type="module" src="script.js"></script>
    <script type="module" src="weather.js"></script>
    <script type="module" src="map.js"></script>
</body>
</html>
