<!DOCTYPE html>
<html lang="de">

<!-- To do: make 15-min prediction when clicking on weather button -->

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shanenigens</title>
    <link rel="stylesheet" href="styles.css" />

    <!-- Include leaflet CSS file --> 
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""/>
    <!-- Include leaflet JS file -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>
</head>

<body class="light-mode">
    <div class="top-bar">
        <div class="times-container" id="sunTimes">Wird geladen…</div>
        <div class="times-container" id="timeZones">Wird geladen…</div>
        <button id="toggleButton">Hell</button>
    </div>

    <div class="main-container">
        <div>
            <h2>Wettervorhersage Amsterdam</h2>
            <div class="weather-container" id="daily-forecast">Wird geladen…</div>
        </div>
        
        <div>
            <h2>Stündliche Vorhersage (Heute)</h2>
            <div class="weather-container" id="hourly-forecast">Wird geladen…</div>
        </div>    

        <div id="map"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
